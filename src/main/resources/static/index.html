<!DOCTYPE html>
<!-- Страница «Статус сети»: список экранов и последний результат анализа по каждому. Точка входа приложения. -->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Статус сети — Screen Monitor</title>
  <link rel="stylesheet" href="/css/screen-monitor.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" data-active=""></aside>
    <main class="main">
      <h1 class="page-title">Статус сети</h1>
      <div class="card">
        <div class="card-header">Экраны и последний результат анализа</div>
        <div class="card-body">
          <table class="status-table" id="status-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Последний кадр</th>
                <th>Результат</th>
              </tr>
            </thead>
            <tbody id="status-tbody"></tbody>
          </table>
          <div id="status-empty" class="empty-state" style="display:none;">Нет зарегистрированных экранов. Добавьте экран через API (POST /api/screens) или загрузите кадр на странице «Загрузка кадра».</div>
        </div>
      </div>
    </main>
  </div>
  <script src="/js/sidebar.js"></script>
  <script src="/js/status.js"></script>
</body>
</html>
